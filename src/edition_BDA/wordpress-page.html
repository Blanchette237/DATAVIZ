<div id="bda-app"></div>

<script>
fetch("http://127.0.0.1:8000/api/editions-par-annee")
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("bda-app");

    data.data.forEach(item => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${item.ville}</h3>
        <p>${item.annees_edition.replace(/\n/g, "<br>")}</p>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.error(err));
</script>
